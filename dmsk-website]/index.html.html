            text-align: center;

            font-weight: bold;
            color: #00ffcc;
        }

        nav {
            text-align: center;
            background: #111;
            padding: 10px;

            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: #00ffcc;
        }

        section {
            padding: 20px;

        }

            color: #00ffcc;
        }

        footer {
            background: black;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            font-size: 14px;
        }

        .card {
            background: #1a1a1a;
            padding: 15px;
            margin: 15px auto;
            border-radius: 10px;
            width: 80%;
        }

</head>
