<!DOCTYPE html>
<html>
<head>
    <title>DMSK Music</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        header {
            background: black;
            padding: 20px;
            font-size: 30px;
            color: #00ffcc;
            font-weight: bold;
        }

        h2 {
            color: #00ffcc;
        }

        .box {
            background: #1a1a1a;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
        }

        img {
            border-radius: 10px;
            width: 250px;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background: black;
        }
    </style>
</head>

<body>

<header>DMSK Music 🎵</header>

<div class="box">
    <h2>Owner: Deepesh Rajak</h2>
    <p>Welcome to my official music website 🎶</p>
</div>

<div class="box">
    <h2>My Image 🖼️</h2>
    <img src="photo.jpg" alt="My Photo">
</div>

<div class="box">
    <h2>My Song 🎧</h2>
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
</div>

<div class="box">
    <h2>My Video 🎬</h2>
    <video width="300" controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</div>

<div class="box">
    <h2>Follow me on Instagram 📸</h2>
    <a href="https://www.instagram.com/the.pesh.rjk" target="_blank" style="color:#00ffcc; font-size:18px;">
        👉 Visit My Instagram
    </a>
</div>

<footer>
    © 2026 DMSK Music | Owner: Deepesh Rajak
</footer>

</body>
</html>
